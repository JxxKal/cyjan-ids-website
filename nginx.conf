server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;

    # Legacy PDF URL → HTML brochure (preserves old shared links).
    location = /CYJAN_Marketing_Brochure.pdf {
        return 301 /design-system/brochure/;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache";
    }
}
