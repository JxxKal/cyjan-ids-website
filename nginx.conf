map $http_x_forwarded_proto $forwarded_scheme {
    default $scheme;
    "~."    $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json font/woff2;

    # Legacy PDF URL → HTML brochure (preserves old shared links).
    location = /CYJAN_Marketing_Brochure.pdf {
        include /etc/nginx/snippets/security-headers.conf;
        return 301 $forwarded_scheme://$host/design-system/brochure/;
    }

    # Long-cache fingerprintable static assets (CSS, fonts, SVG, brand images).
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Screenshots — cache for a day; refreshed regularly with marketing updates.
    location /screenshots/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # HTML and everything else — never cache; copy/version badge updates instantly.
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-store, no-cache" always;
    }
}
