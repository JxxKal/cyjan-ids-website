map $http_x_forwarded_proto $forwarded_scheme {
    default $scheme;
    "~."    $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json font/woff2;

    # Legacy PDF URL → HTML brochure (preserves old shared links).
    location = /CYJAN_Marketing_Brochure.pdf {
        include /etc/nginx/snippets/security-headers.conf;
        return 301 $forwarded_scheme://$host/design-system/brochure/;
    }

    # Long-cache fingerprintable static assets (CSS, fonts, SVG, brand images).
    # Note: Cache-Control is intentionally NOT marked `always` so that 4xx/5xx
    # responses don't inherit the immutable directive and pollute CDN caches.
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /screenshots/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # HTML and everything else — never cache; copy/version badge updates instantly.
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-store, no-cache" always;
    }
}
