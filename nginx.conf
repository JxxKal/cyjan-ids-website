server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;

    # Legacy PDF URL → HTML brochure (preserves old shared links). Prefers the
    # X-Forwarded-Proto header from Cloudflare so the redirect stays on https;
    # falls back to $scheme for direct-to-origin access.
    location = /CYJAN_Marketing_Brochure.pdf {
        set $redirect_proto $http_x_forwarded_proto;
        if ($redirect_proto = "") {
            set $redirect_proto $scheme;
        }
        return 301 $redirect_proto://$host/design-system/brochure/;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache";
    }
}
