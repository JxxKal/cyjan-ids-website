services:
  web:
    image: nginx:alpine
    ports:
      - "4444:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./CYJAN_Marketing_Brochure.pdf:/usr/share/nginx/html/CYJAN_Marketing_Brochure.pdf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
